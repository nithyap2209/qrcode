<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ detail.title|default('Secure Message') }}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <!-- ✅ YOUR EXTERNAL CSS (ADD HERE) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/text-display.css') }}">
</head>
<body>
    <!-- Floating Particles Background -->
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    
    <div class="container">
        <div class="content-header">
            <div class="header-decoration"></div>
            <h1 class="content-title">{{ detail.title|default('Secure Message') }}</h1>
            <div class="timestamp">{{ now }}</div>

        </div>
        
        <div class="main-content">
            <div class="hexagon-decoration"></div>
            <div class="hexagon-decoration"></div>
            
            <div class="text-content">
                {{ detail.text|default('')|safe }}
            </div>
        </div>
        
        <div class="actions">
            <button class="action-btn primary-btn" id="copyBtn">
                <span class="btn-icon">📋</span> Copy Text
            </button>
            <button class="action-btn secondary-btn" id="shareBtn">
                <span class="btn-icon">📤</span> Share
            </button>
            <button class="action-btn accent-btn" id="qrcodeBtn">
                <span class="btn-icon">📱</span> QR Code
            </button>
        </div>
        
        <div class="security-badge">
            <span class="security-icon">🔐</span>
            <span>End-to-end encrypted message</span>
        </div>
    </div>
    
    <!-- Share Options Modal -->
    <div class="modal" id="shareModal">
        <div class="modal-content">
            <button class="close-btn" id="closeShareModal">&times;</button>
            <div class="modal-header">
                <h2 class="modal-title">Share via</h2>
            </div>
            <div class="modal-body">
                <div class="share-options">
                    <button class="share-option-btn" id="shareWhatsApp">
                        <span class="share-icon">💬</span>
                        <span>WhatsApp</span>
                    </button>
                    <button class="share-option-btn" id="shareGmail">
                        <span class="share-icon">📧</span>
                        <span>Gmail</span>
                    </button>
                    <button class="share-option-btn" id="shareFacebook">
                        <span class="share-icon">📘</span>
                        <span>Facebook</span>
                    </button>
                    <button class="share-option-btn" id="shareTwitter">
                        <span class="share-icon">🐦</span>
                        <span>Twitter</span>
                    </button>
                    <button class="share-option-btn" id="shareLinkedIn">
                        <span class="share-icon">💼</span>
                        <span>LinkedIn</span>
                    </button>
                    <button class="share-option-btn" id="shareCopy">
                        <span class="share-icon">📋</span>
                        <span>Copy Link</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div class="modal" id="qrModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <div class="modal-header">
                <h2 class="modal-title">Scan to View</h2>
            </div>
            <div class="modal-body">
                <div class="qr-container" id="qrcode"></div>
            </div>
            <div class="modal-footer">
                <button class="action-btn primary-btn" id="downloadQrBtn">
                    <span class="btn-icon">💾</span> Download QR
                </button>
            </div>
        </div>
    </div>
    
    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- Include QR code library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script>
        // DOM elements
        const copyBtn = document.getElementById('copyBtn');
        const shareBtn = document.getElementById('shareBtn');
        const qrcodeBtn = document.getElementById('qrcodeBtn');
        const qrModal = document.getElementById('qrModal');
        const closeModal = document.getElementById('closeModal');
        const downloadQrBtn = document.getElementById('downloadQrBtn');
        const toast = document.getElementById('toast');
        const textContent = document.querySelector('.text-content');
        
        // Current timestamp for the message
        const currentTimestamp = new Date().toLocaleString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        
        // Update the timestamp display
        document.querySelector('.timestamp').textContent = currentTimestamp;
        
        // Function to show toast notification
        function showToast(message, type = 'success', duration = 3000) {
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }
        
        // Copy text to clipboard with fallbacks
        function copyText() {
            const text = textContent.innerText;
            
            if (navigator.clipboard && window.isSecureContext) {
                // Use modern clipboard API when available
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.innerHTML = '<span class="btn-icon">✓</span> Copied!';
                    showToast('Message copied to clipboard');
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = '<span class="btn-icon">📋</span> Copy Text';
                    }, 2000);
                }).catch(err => {
                    console.error('Clipboard write failed:', err);
                    showToast('Failed to copy. Please try again.', 'error');
                });
            } else {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.opacity = '0';
                document.body.appendChild(textArea);
                textArea.select();
                
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        copyBtn.innerHTML = '<span class="btn-icon">✓</span> Copied!';
                        showToast('Message copied to clipboard');
                        
                        setTimeout(() => {
                            copyBtn.innerHTML = '<span class="btn-icon">📋</span> Copy Text';
                        }, 2000);
                    } else {
                        showToast('Failed to copy. Please try again.', 'error');
                    }
                } catch (err) {
                    console.error('execCommand error:', err);
                    showToast('Failed to copy. Please try again.', 'error');
                }
                
                document.body.removeChild(textArea);
            }
        }
        
        // Open share modal
        function shareText() {
            const shareModal = document.getElementById('shareModal');
            shareModal.classList.add('active');
        }

        // Close share modal
        function closeShareModal() {
            const shareModal = document.getElementById('shareModal');
            shareModal.classList.remove('active');
        }

        // Get text and URL for sharing
        function getShareData() {
            const text = textContent.innerText;
            const title = document.querySelector('.content-title').textContent;
            const url = window.location.href;
            return { text, title, url };
        }

        // Share via WhatsApp
        function shareViaWhatsApp() {
            const { text, url } = getShareData();
            const shareText = encodeURIComponent(`${text}\n\n${url}`);
            window.open(`https://wa.me/?text=${shareText}`, '_blank');
            closeShareModal();
            showToast('Opening WhatsApp...');
        }

        // Share via Gmail
        function shareViaGmail() {
            const { text, title, url } = getShareData();
            const subject = encodeURIComponent(title);
            const body = encodeURIComponent(`${text}\n\nView original: ${url}`);
            window.open(`https://mail.google.com/mail/?view=cm&fs=1&su=${subject}&body=${body}`, '_blank');
            closeShareModal();
            showToast('Opening Gmail...');
        }

        // Share via Facebook
        function shareViaFacebook() {
            const { url } = getShareData();
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
            closeShareModal();
            showToast('Opening Facebook...');
        }

        // Share via Twitter
        function shareViaTwitter() {
            const { text, url } = getShareData();
            const tweetText = encodeURIComponent(text.substring(0, 200) + (text.length > 200 ? '...' : ''));
            window.open(`https://twitter.com/intent/tweet?text=${tweetText}&url=${encodeURIComponent(url)}`, '_blank');
            closeShareModal();
            showToast('Opening Twitter...');
        }

        // Share via LinkedIn
        function shareViaLinkedIn() {
            const { url } = getShareData();
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`, '_blank');
            closeShareModal();
            showToast('Opening LinkedIn...');
        }

        // Copy link to clipboard
        function copyLink() {
            const { url } = getShareData();

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url).then(() => {
                    closeShareModal();
                    showToast('Link copied to clipboard');
                }).catch(err => {
                    console.error('Clipboard write failed:', err);
                    showToast('Failed to copy link', 'error');
                });
            } else {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = url;
                textArea.style.position = 'fixed';
                textArea.style.opacity = '0';
                document.body.appendChild(textArea);
                textArea.select();

                try {
                    document.execCommand('copy');
                    closeShareModal();
                    showToast('Link copied to clipboard');
                } catch (err) {
                    console.error('execCommand error:', err);
                    showToast('Failed to copy link', 'error');
                }

                document.body.removeChild(textArea);
            }
        }
        
        // Generate and display QR code
        function generateQRCode() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ''; // Clear previous QR code
            
            new QRCode(qrContainer, {
                text: window.location.href,
                width: 200,
                height: 200,
                colorDark: "#111827",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            
            qrModal.classList.add('active');
        }
        
        // Download QR code as high-resolution image
        function downloadQRCode() {
            // Create a temporary container for high-res QR code
            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px';
            document.body.appendChild(tempContainer);

            // Generate high-resolution QR code (1024x1024 for better scanning)
            new QRCode(tempContainer, {
                text: window.location.href,
                width: 1024,
                height: 1024,
                colorDark: "#000000",  // Pure black for better contrast
                colorLight: "#ffffff",  // Pure white
                correctLevel: QRCode.CorrectLevel.H  // Highest error correction
            });

            // Wait for QR code to be generated
            setTimeout(() => {
                const highResCanvas = tempContainer.querySelector('canvas');
                if (!highResCanvas) {
                    document.body.removeChild(tempContainer);
                    showToast('Failed to generate QR code', 'error');
                    return;
                }

                // Create a new canvas with white background and margin
                const finalCanvas = document.createElement('canvas');
                const margin = 80; // Add margin for quiet zone
                const finalSize = 1024 + (margin * 2);
                finalCanvas.width = finalSize;
                finalCanvas.height = finalSize;

                const ctx = finalCanvas.getContext('2d');

                // Fill with white background
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, finalSize, finalSize);

                // Draw the QR code with margin
                ctx.drawImage(highResCanvas, margin, margin, 1024, 1024);

                // Download the final canvas
                const link = document.createElement('a');
                link.download = 'secure-message-qr.png';
                link.href = finalCanvas.toDataURL('image/png', 1.0); // Maximum quality
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // Clean up
                document.body.removeChild(tempContainer);

                showToast('High-quality QR code downloaded');
            }, 100);
        }
        
        // Close modal when clicking outside or on close button
        function closeQRModal() {
            qrModal.classList.remove('active');
        }
        
        // Event listeners
        copyBtn.addEventListener('click', copyText);
        shareBtn.addEventListener('click', shareText);
        qrcodeBtn.addEventListener('click', generateQRCode);
        closeModal.addEventListener('click', closeQRModal);
        downloadQrBtn.addEventListener('click', downloadQRCode);

        // Share modal event listeners
        document.getElementById('closeShareModal').addEventListener('click', closeShareModal);
        document.getElementById('shareWhatsApp').addEventListener('click', shareViaWhatsApp);
        document.getElementById('shareGmail').addEventListener('click', shareViaGmail);
        document.getElementById('shareFacebook').addEventListener('click', shareViaFacebook);
        document.getElementById('shareTwitter').addEventListener('click', shareViaTwitter);
        document.getElementById('shareLinkedIn').addEventListener('click', shareViaLinkedIn);
        document.getElementById('shareCopy').addEventListener('click', copyLink);

        // Close modals when clicking outside
        const shareModal = document.getElementById('shareModal');
        shareModal.addEventListener('click', function(e) {
            if (e.target === shareModal) {
                closeShareModal();
            }
        });

        qrModal.addEventListener('click', function(e) {
            if (e.target === qrModal) {
                closeQRModal();
            }
        });

        // Close modals with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (qrModal.classList.contains('active')) {
                    closeQRModal();
                }
                if (shareModal.classList.contains('active')) {
                    closeShareModal();
                }
            }
        });
        
        // Check if text content is empty and display fallback message
        if (!textContent.textContent.trim()) {
            textContent.classList.add('empty');
        }
    </script>
</body>
</html>
